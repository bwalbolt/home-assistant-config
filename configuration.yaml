
# Loads default set of integrations. Do not remove.
default_config:

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 192.168.0.103
  ip_ban_enabled: true
  login_attempts_threshold: 3

homeassistant:
  auth_providers:
    - type: trusted_networks
      trusted_networks:
        - 192.168.0.0/24
      trusted_users:
        192.168.0.0/24: 22bae4d2849349f6a0e85324fd8597b7
      allow_bypass_login: true
    - type: homeassistant

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

switch:
  - platform: broadlink
    mac: !secret broadlink_mac
    switches:
      - name: "Zap 1"
        command_on: 
        command_off: 
      - name: "Zap 2"
        command_on: 
        command_off: 
      - name: "Zap 3"
        command_on: 
        command_off: 
      - name: "Zap 4"
        command_on: 
        command_off: 
      - name: "Zap 5"
        command_on: 
        command_off: 


template:
- sensor:
  - default_entity_id: sensor.roborock_icon
    state: '{{ states.vacuum.roborock_s7.attributes.battery_icon }}'
    name: roborock_icon

ios:
  actions:
    - name: Toggle Garage Door
      background_color: "#03a9f4"
      label:
        text: "Garage"
        color: "#ffffff"
      icon:
        icon: garage
        color: "#ffffff"
    - name: Toggle Front Door Lock
      background_color: "#03a9f4"
      label:
        text: "Front Door"
        color: "#ffffff"
      icon:
        icon: lock-open
        color: "#ffffff"
    - name: Toggle Plant Light
      background_color: "#03a9f4"
      label:
        text: "Plant Light"
        color: "#ffffff"
      icon:
        icon: floor-lamp
        color: "#ffffff"
    - name: Toggle Patio Lights
      background_color: "#03a9f4"
      label:
        text: "Patio Lights"
        color: "#ffffff"
      icon:
        icon: string-lights
        color: "#ffffff"


automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
